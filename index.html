<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>庫存管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#1a1a2e;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e8eaf0;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:#1D9E75;border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:18px;height:18px;fill:white}
.logo-text{font-size:15px;font-weight:600;color:#1a1a2e}
.logo-sub{font-size:11px;color:#888;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.api-badge{font-size:11px;padding:5px 12px;border-radius:20px;background:#FFF8EC;color:#B8660A;border:1px solid #FDDEA0;cursor:pointer;transition:all 0.15s}
.api-badge.connected{background:#EAF7F2;color:#0F6E56;border-color:#9FE1CB}
.btn{padding:8px 18px;font-size:13px;border-radius:8px;cursor:pointer;font-weight:500;transition:all 0.15s;border:1px solid #dde1ec;background:#fff;color:#1a1a2e}
.btn:hover{background:#f5f6fa}
.btn.primary{background:#1D9E75;color:white;border-color:#1D9E75}
.btn.primary:hover{background:#0F6E56}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:2rem}
.stat{background:#fff;border-radius:12px;padding:1.25rem;border:1px solid #e8eaf0}
.stat-label{font-size:12px;color:#888;margin-bottom:8px}
.stat-val{font-size:24px;font-weight:600;color:#1a1a2e}
.stat-sub{font-size:11px;color:#aaa;margin-top:4px}
.stat-val.warn{color:#B8660A}
.stat-val.danger{color:#C0392B}
.card{background:#fff;border-radius:12px;border:1px solid #e8eaf0;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid #e8eaf0;padding:0 1.25rem}
.tab{padding:14px 18px;font-size:14px;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;font-weight:500}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75}
.tab:hover:not(.active){color:#1a1a2e}
.toolbar{display:flex;align-items:center;gap:10px;padding:1rem 1.25rem;border-bottom:1px solid #e8eaf0}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;font-size:14px;border:1px solid #dde1ec;border-radius:8px;background:#f5f6fa;color:#1a1a2e;outline:none}
.search-wrap input:focus{border-color:#1D9E75;background:#fff}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa}
select{padding:8px 12px;font-size:14px;border:1px solid #dde1ec;border-radius:8px;background:#f5f6fa;color:#1a1a2e;outline:none}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:10px 14px;font-size:12px;color:#888;font-weight:600;background:#f9fafb;border-bottom:1px solid #e8eaf0;text-transform:uppercase;letter-spacing:0.5px}
td{padding:12px 14px;border-bottom:1px solid #f0f2f8;color:#1a1a2e;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.ok{background:#EAF7F2;color:#0F6E56}
.badge.low{background:#FFF8EC;color:#B8660A}
.badge.out{background:#FEECEC;color:#C0392B}
.badge.cat{background:#EEF2FF;color:#4338CA}
.qty-bar{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;height:5px;background:#e8eaf0;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:#1D9E75;transition:width 0.4s}
.bar-fill.warn{background:#F59E0B}
.bar-fill.out{background:#EF4444}
.action-btns{display:flex;gap:6px}
.icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid #dde1ec;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555;font-size:15px;transition:all 0.15s;font-weight:600}
.icon-btn:hover{background:#EAF7F2;border-color:#1D9E75;color:#1D9E75}
.icon-btn.out-btn:hover{background:#FEECEC;border-color:#EF4444;color:#EF4444}
.footer-note{font-size:12px;color:#aaa;padding:10px 14px;background:#f9fafb;border-top:1px solid #e8eaf0;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#F59E0B;display:inline-block;flex-shrink:0}
.dot.green{background:#1D9E75}
.history-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f0f2f8;gap:12px;font-size:13px}
.history-row:last-child{border-bottom:none}
.hist-type{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;min-width:50px;text-align:center}
.hist-in{background:#EAF7F2;color:#0F6E56}
.hist-out{background:#FEECEC;color:#C0392B}
.hist-info{flex:1}
.hist-name{font-weight:600;color:#1a1a2e;margin-bottom:2px}
.hist-meta{font-size:11px;color:#aaa}
.hist-qty.in{font-size:14px;font-weight:700;color:#1D9E75}
.hist-qty.out{font-size:14px;font-weight:700;color:#EF4444}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:14px}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.75rem;width:460px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:1.5rem;color:#1a1a2e}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 12px;font-size:14px;border:1px solid #dde1ec;border-radius:8px;background:#f5f6fa;color:#1a1a2e;outline:none;transition:border 0.15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#1D9E75;background:#fff}
.form-row textarea{resize:vertical;min-height:64px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.inv-notice{font-size:12px;color:#B8660A;background:#FFF8EC;border:1px solid #FDDEA0;border-radius:8px;padding:10px 12px;margin-top:4px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:1.5rem}
/* Config modal */
.config-section{margin-bottom:1.25rem}
.config-section label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
.config-section input{width:100%;padding:10px 12px;font-size:13px;border:1px solid #dde1ec;border-radius:8px;background:#f5f6fa;color:#1a1a2e;outline:none;font-family:monospace}
.config-section input:focus{border-color:#1D9E75;background:#fff}
.config-hint{font-size:12px;color:#aaa;margin-top:5px;line-height:1.5}
.toast{position:fixed;bottom:2rem;right:2rem;background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transform:translateY(10px);transition:all 0.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:#C0392B}
.toast.success{background:#0F6E56}
.loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.prod-add-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;color:#1D9E75;font-size:13px;font-weight:600;cursor:pointer;border-top:1px solid #f0f2f8}
.prod-add-btn:hover{background:#EAF7F2}
@media(max-width:700px){
  .stats{grid-template-columns:1fr 1fr}
  .form-2col{grid-template-columns:1fr}
  th:nth-child(4),td:nth-child(4){display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 20 20"><path d="M3 4h14v2H3V4zm0 5h14v2H3V9zm0 5h9v2H3v-2z"/></svg>
    </div>
    <div>
      <div class="logo-text">庫存管理系統</div>
      <div class="logo-sub">光貿電子發票整合版</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="api-badge" id="api-badge" onclick="openConfig()">⚡ 點此設定 Google Sheets</span>
    <button class="btn" onclick="openAddProduct()">＋ 新增商品</button>
    <button class="btn primary" onclick="openModal('in')">進貨</button>
    <button class="btn" style="border-color:#EF4444;color:#EF4444" onclick="openModal('out')">出貨</button>
  </div>
</div>

<div class="main">
  <div class="stats" id="stats"></div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('inventory',this)">商品庫存</div>
      <div class="tab" onclick="switchTab('history',this)">進出貨記錄</div>
    </div>

    <!-- 庫存 tab -->
    <div id="tab-inventory">
      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.868-3.834zm-5.242 1.656a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
          <input type="text" placeholder="搜尋商品名稱、編號..." oninput="filterProducts(this.value)" id="search-input">
        </div>
        <select onchange="filterCategory(this.value)" id="cat-filter">
          <option value="">全部分類</option>
        </select>
        <button class="btn" onclick="syncFromSheets()" id="sync-btn">↻ 同步</button>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:80px">編號</th>
            <th>商品名稱</th>
            <th style="width:80px">分類</th>
            <th style="width:80px">單價</th>
            <th style="width:180px">庫存量</th>
            <th style="width:80px">狀態</th>
            <th style="width:90px">操作</th>
          </tr>
        </thead>
        <tbody id="product-tbody"></tbody>
      </table>
      <div class="footer-note">
        <span class="dot" id="sheets-dot"></span>
        <span id="sheets-note">尚未連線 Google Sheets — 資料暫存於本機</span>
      </div>
    </div>

    <!-- 記錄 tab -->
    <div id="tab-history" style="display:none">
      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.868-3.834zm-5.242 1.656a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
          <input type="text" placeholder="搜尋商品、備註..." oninput="filterHistory(this.value)">
        </div>
        <select onchange="filterHistType(this.value)">
          <option value="">全部類型</option>
          <option value="in">進貨</option>
          <option value="out">出貨</option>
        </select>
      </div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- 進出貨 Modal -->
<div class="modal-bg" id="tx-modal">
  <div class="modal">
    <h3 id="modal-title">新增進貨</h3>
    <div class="form-2col">
      <div class="form-row">
        <label>商品</label>
        <select id="f-product" onchange="onProductChange(this.value)">
          <option value="">選擇商品...</option>
        </select>
      </div>
      <div class="form-row">
        <label>數量</label>
        <input type="number" id="f-qty" min="1" value="1">
      </div>
    </div>
    <div class="form-2col">
      <div class="form-row">
        <label>單價（元）</label>
        <input type="number" id="f-price" min="0" placeholder="自動帶入">
      </div>
      <div class="form-row">
        <label>日期</label>
        <input type="date" id="f-date">
      </div>
    </div>
    <div class="form-row">
      <label>備註（供應商 / 客戶 / 單號）</label>
      <textarea id="f-note" placeholder="選填..."></textarea>
    </div>
    <div id="inv-notice" style="display:none" class="inv-notice">
      ⚡ 設定光貿 API 後，出貨時可自動開立電子發票
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeTxModal()">取消</button>
      <button class="btn primary" onclick="submitTx()" id="tx-submit-btn">確認</button>
    </div>
  </div>
</div>

<!-- 新增商品 Modal -->
<div class="modal-bg" id="product-modal">
  <div class="modal">
    <h3 id="product-modal-title">新增商品</h3>
    <div class="form-2col">
      <div class="form-row">
        <label>商品編號</label>
        <input type="text" id="p-id" placeholder="P007">
      </div>
      <div class="form-row">
        <label>商品名稱</label>
        <input type="text" id="p-name" placeholder="商品名稱">
      </div>
    </div>
    <div class="form-2col">
      <div class="form-row">
        <label>分類</label>
        <input type="text" id="p-cat" placeholder="文具、3C配件...">
      </div>
      <div class="form-row">
        <label>單價（元）</label>
        <input type="number" id="p-price" min="0" placeholder="0">
      </div>
    </div>
    <div class="form-2col">
      <div class="form-row">
        <label>初始庫存</label>
        <input type="number" id="p-stock" min="0" value="0">
      </div>
      <div class="form-row">
        <label>最低庫存警示</label>
        <input type="number" id="p-min" min="0" value="5">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeProductModal()">取消</button>
      <button class="btn primary" onclick="submitProduct()">新增</button>
    </div>
  </div>
</div>

<!-- 設定 Modal -->
<div class="modal-bg" id="config-modal">
  <div class="modal">
    <h3>系統設定</h3>
    <div class="config-section">
      <label>Google Apps Script 網址</label>
      <input type="text" id="cfg-script-url" placeholder="https://script.google.com/macros/s/...">
      <div class="config-hint">部署 Google Apps Script 後貼上網址，系統即可讀寫 Google Sheets 資料</div>
    </div>
    <div class="config-section" style="border-top:1px solid #f0f2f8;padding-top:1.25rem">
      <label>光貿電子發票 API 金鑰（選填）</label>
      <input type="text" id="cfg-kuma-key" placeholder="輸入光貿 API Key...">
      <div class="config-hint">設定後，出貨時可選擇自動開立電子發票</div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeConfig()">取消</button>
      <button class="btn primary" onclick="saveConfig()">儲存設定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 資料 ──────────────────────────────────────────────
let products = JSON.parse(localStorage.getItem('inv_products') || 'null') || [
  {id:'P001',name:'A4影印紙 (一箱)',cat:'文具',price:350,stock:45,min:10},
  {id:'P002',name:'原子筆 (藍) 12支裝',cat:'文具',price:89,stock:3,min:5},
  {id:'P003',name:'USB-C 充電線 1m',cat:'3C配件',price:199,stock:28,min:8},
  {id:'P004',name:'無線鍵盤',cat:'3C配件',price:890,stock:0,min:2},
  {id:'P005',name:'膠帶台',cat:'文具',price:120,stock:15,min:5},
  {id:'P006',name:'筆記本 A5',cat:'文具',price:55,stock:60,min:10},
];
let history = JSON.parse(localStorage.getItem('inv_history') || '[]');
let config = JSON.parse(localStorage.getItem('inv_config') || '{}');

let searchVal='', catVal='', histSearch='', histTypeVal='';
let currentTxType='in';

function save(){
  localStorage.setItem('inv_products', JSON.stringify(products));
  localStorage.setItem('inv_history', JSON.stringify(history));
}

// ── 狀態輔助 ─────────────────────────────────────────
function getStatus(p){
  if(p.stock===0) return 'out';
  if(p.stock<p.min) return 'low';
  return 'ok';
}
function statusLabel(s){
  return {ok:['ok','正常'],low:['low','偏低'],out:['out','缺貨']}[s];
}
function pct(p){ return Math.min(100,Math.round(p.stock/Math.max(1,p.min*3)*100)); }

// ── 渲染 ──────────────────────────────────────────────
function renderStats(){
  const total=products.length;
  const lowCount=products.filter(p=>getStatus(p)==='low').length;
  const outCount=products.filter(p=>getStatus(p)==='out').length;
  const totalVal=products.reduce((a,p)=>a+p.stock*p.price,0);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">商品種類</div><div class="stat-val">${total}</div><div class="stat-sub">品項</div></div>
    <div class="stat"><div class="stat-label">庫存警示</div><div class="stat-val ${(lowCount+outCount)>0?'warn':''}">${lowCount+outCount}</div><div class="stat-sub">${lowCount} 偏低 · ${outCount} 缺貨</div></div>
    <div class="stat"><div class="stat-label">進出貨記錄</div><div class="stat-val">${history.length}</div><div class="stat-sub">筆</div></div>
    <div class="stat"><div class="stat-label">庫存總值</div><div class="stat-val">$${totalVal.toLocaleString()}</div><div class="stat-sub">元</div></div>
  `;
}

function renderProducts(){
  const cats=[...new Set(products.map(p=>p.cat))];
  const cf=document.getElementById('cat-filter');
  const cur=cf.value;
  cf.innerHTML='<option value="">全部分類</option>'+cats.map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');

  let list=products.filter(p=>{
    const ms=!searchVal||p.name.includes(searchVal)||p.id.includes(searchVal);
    const mc=!catVal||p.cat===catVal;
    return ms&&mc;
  });
  const tbody=document.getElementById('product-tbody');
  if(!list.length){tbody.innerHTML=`<tr><td colspan="7" class="empty">沒有符合的商品</td></tr>`;return;}
  tbody.innerHTML=list.map(p=>{
    const s=getStatus(p);
    const [sc,sl]=statusLabel(s);
    const pc=pct(p);
    const barClass=s==='ok'?'':s;
    return`<tr>
      <td style="font-family:monospace;font-size:12px;color:#aaa">${p.id}</td>
      <td style="font-weight:600">${p.name}</td>
      <td><span class="badge cat">${p.cat}</span></td>
      <td>$${p.price.toLocaleString()}</td>
      <td>
        <div class="qty-bar">
          <span style="font-size:13px;min-width:32px;font-weight:600">${p.stock}</span>
          <div class="bar-bg"><div class="bar-fill ${barClass}" style="width:${pc}%"></div></div>
          <span style="font-size:11px;color:#aaa">min:${p.min}</span>
        </div>
      </td>
      <td><span class="badge ${sc}">${sl}</span></td>
      <td>
        <div class="action-btns">
          <button class="icon-btn" title="進貨" onclick="quickTx('in','${p.id}')">↑</button>
          <button class="icon-btn out-btn" title="出貨" onclick="quickTx('out','${p.id}')">↓</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderHistory(){
  let list=[...history].reverse().filter(h=>{
    const ms=!histSearch||h.name.includes(histSearch)||(h.note||'').includes(histSearch);
    const mt=!histTypeVal||h.type===histTypeVal;
    return ms&&mt;
  });
  const el=document.getElementById('history-list');
  if(!list.length){el.innerHTML=`<div class="empty">尚無記錄</div>`;return;}
  el.innerHTML=list.map(h=>`
    <div class="history-row">
      <span class="hist-type ${h.type==='in'?'hist-in':'hist-out'}">${h.type==='in'?'進貨':'出貨'}</span>
      <div class="hist-info">
        <div class="hist-name">${h.name}</div>
        <div class="hist-meta">${h.date}${h.note?' · '+h.note:''}</div>
      </div>
      <span class="hist-qty ${h.type}">${h.type==='in'?'+':'−'}${h.qty} 件</span>
      <span style="font-size:12px;color:#aaa;min-width:80px;text-align:right">$${(h.price*h.qty).toLocaleString()}</span>
    </div>
  `).join('');
}

function render(){renderStats();renderProducts();renderHistory();}

// ── 篩選 ──────────────────────────────────────────────
function filterProducts(v){searchVal=v;renderProducts();}
function filterCategory(v){catVal=v;renderProducts();}
function filterHistory(v){histSearch=v;renderHistory();}
function filterHistType(v){histTypeVal=v;renderHistory();}

// ── Tab ───────────────────────────────────────────────
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-inventory').style.display=tab==='inventory'?'block':'none';
  document.getElementById('tab-history').style.display=tab==='history'?'block':'none';
}

// ── 進出貨 Modal ──────────────────────────────────────
function openModal(type){
  currentTxType=type;
  document.getElementById('modal-title').textContent=type==='in'?'新增進貨':'新增出貨';
  const sel=document.getElementById('f-product');
  sel.innerHTML='<option value="">選擇商品...</option>'+products.map(p=>`<option value="${p.id}">${p.id} — ${p.name} (庫存:${p.stock})</option>`).join('');
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-qty').value=1;
  document.getElementById('f-price').value='';
  document.getElementById('f-note').value='';
  document.getElementById('inv-notice').style.display=(!config.kumaKey&&type==='out')?'block':'none';
  document.getElementById('tx-modal').classList.add('show');
}
function quickTx(type,pid){
  openModal(type);
  document.getElementById('f-product').value=pid;
  onProductChange(pid);
}
function closeTxModal(){document.getElementById('tx-modal').classList.remove('show');}
function onProductChange(pid){
  const p=products.find(x=>x.id===pid);
  if(p) document.getElementById('f-price').value=p.price;
}

function submitTx(){
  const pid=document.getElementById('f-product').value;
  const qty=parseInt(document.getElementById('f-qty').value)||0;
  const price=parseFloat(document.getElementById('f-price').value)||0;
  const date=document.getElementById('f-date').value;
  const note=document.getElementById('f-note').value.trim();
  if(!pid||!qty){toast('請選擇商品並填寫數量','error');return;}
  const p=products.find(x=>x.id===pid);
  if(!p) return;
  if(currentTxType==='out'&&p.stock<qty){toast(`庫存不足！目前庫存：${p.stock} 件`,'error');return;}
  if(currentTxType==='in') p.stock+=qty;
  else p.stock-=qty;
  const rec={type:currentTxType,id:pid,name:p.name,qty,price:price||p.price,date,note};
  history.push(rec);
  save();
  closeTxModal();
  render();
  toast(currentTxType==='in'?`已進貨 ${qty} 件`:`已出貨 ${qty} 件`,'success');
  if(config.scriptUrl) syncToSheets(rec);
}

// ── 新增商品 Modal ─────────────────────────────────────
function openAddProduct(){
  document.getElementById('p-id').value='';
  document.getElementById('p-name').value='';
  document.getElementById('p-cat').value='';
  document.getElementById('p-price').value='';
  document.getElementById('p-stock').value='0';
  document.getElementById('p-min').value='5';
  document.getElementById('product-modal').classList.add('show');
}
function closeProductModal(){document.getElementById('product-modal').classList.remove('show');}
function submitProduct(){
  const id=document.getElementById('p-id').value.trim();
  const name=document.getElementById('p-name').value.trim();
  const cat=document.getElementById('p-cat').value.trim();
  const price=parseFloat(document.getElementById('p-price').value)||0;
  const stock=parseInt(document.getElementById('p-stock').value)||0;
  const min=parseInt(document.getElementById('p-min').value)||5;
  if(!id||!name){toast('請填寫編號與商品名稱','error');return;}
  if(products.find(p=>p.id===id)){toast('商品編號已存在','error');return;}
  products.push({id,name,cat,price,stock,min});
  save();
  closeProductModal();
  render();
  toast(`商品 ${name} 已新增`,'success');
}

// ── 設定 Modal ─────────────────────────────────────────
function openConfig(){
  document.getElementById('cfg-script-url').value=config.scriptUrl||'';
  document.getElementById('cfg-kuma-key').value=config.kumaKey||'';
  document.getElementById('config-modal').classList.add('show');
}
function closeConfig(){document.getElementById('config-modal').classList.remove('show');}
function saveConfig(){
  config.scriptUrl=document.getElementById('cfg-script-url').value.trim();
  config.kumaKey=document.getElementById('cfg-kuma-key').value.trim();
  localStorage.setItem('inv_config',JSON.stringify(config));
  updateApiStatus();
  closeConfig();
  toast('設定已儲存','success');
}
function updateApiStatus(){
  const badge=document.getElementById('api-badge');
  const dot=document.getElementById('sheets-dot');
  const note=document.getElementById('sheets-note');
  if(config.scriptUrl){
    badge.textContent='✓ Google Sheets 已連線';
    badge.className='api-badge connected';
    dot.className='dot green';
    note.textContent='資料同步至 Google Sheets'+(config.kumaKey?' · 光貿電子發票已啟用':'');
  } else {
    badge.textContent='⚡ 點此設定 Google Sheets';
    badge.className='api-badge';
    dot.className='dot';
    note.textContent='尚未連線 Google Sheets — 資料暫存於本機 (localStorage)';
  }
}

// ── Google Sheets 同步 ────────────────────────────────
async function syncToSheets(record){
  if(!config.scriptUrl) return;
  try{
    await fetch(config.scriptUrl,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'addRecord',record,products})
    });
  }catch(e){console.warn('Sheets sync failed',e);}
}

async function syncFromSheets(){
  if(!config.scriptUrl){toast('請先設定 Google Sheets 網址','error');return;}
  const btn=document.getElementById('sync-btn');
  btn.disabled=true;btn.textContent='同步中...';
  try{
    const res=await fetch(config.scriptUrl+'?action=getData');
    const data=await res.json();
    if(data.products) products=data.products;
    if(data.history) history=data.history;
    save();render();
    toast('同步成功','success');
  }catch(e){
    toast('同步失敗，請確認 Script 網址','error');
  }finally{
    btn.disabled=false;btn.textContent='↻ 同步';
  }
}

// ── Toast ─────────────────────────────────────────────
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(type?' '+type:'');
  setTimeout(()=>el.className='toast',2500);
}

// ── Modal 背景關閉 ────────────────────────────────────
['tx-modal','product-modal','config-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){
    if(e.target===this) this.classList.remove('show');
  });
});

// ── 初始化 ────────────────────────────────────────────
updateApiStatus();
render();
</script>
